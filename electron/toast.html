<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: no-drag;
      user-select: none;
      padding: 8px;
    }

    .toast {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: slideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .toast::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 12px 0 0 12px;
    }

    .toast.card::before  { background: #22c55e; }
    .toast.urgent::before { background: #ef4444; }
    .toast.chat::before  { background: #3b82f6; }

    .toast.fade-out {
      animation: slideOut 0.3s ease forwards;
    }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .toast.card  .icon { background: rgba(34,197,94,0.15); }
    .toast.urgent .icon { background: rgba(239,68,68,0.15); }
    .toast.chat  .icon { background: rgba(59,130,246,0.15); }

    .content {
      flex: 1;
      min-width: 0;
    }

    .type-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .toast.card  .type-label { color: #22c55e; }
    .toast.urgent .type-label { color: #ef4444; }
    .toast.chat  .type-label { color: #3b82f6; }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .body {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .close {
      position: absolute;
      top: 10px; right: 10px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #2a2a2a;
      border: none;
      color: #666;
      font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .toast:hover .close { opacity: 1; }
    .close:hover { background: #3a3a3a; color: #ccc; }

    .progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      border-radius: 0 0 12px 12px;
      animation: shrink linear forwards;
    }

    .toast.card  .progress { background: #22c55e; }
    .toast.urgent .progress { background: #ef4444; }
    .toast.chat  .progress { background: #3b82f6; }

    @keyframes slideIn {
      from { transform: translateX(340px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    @keyframes slideOut {
      from { transform: translateX(0);    opacity: 1; max-height: 100px; margin-bottom: 0; }
      to   { transform: translateX(340px); opacity: 0; max-height: 0;   margin-bottom: -8px; }
    }

    @keyframes shrink {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="icon" id="icon"></div>
    <div class="content">
      <div class="type-label" id="typeLabel"></div>
      <div class="title"      id="title"></div>
      <div class="body"       id="body"></div>
    </div>
    <button class="close" id="closeBtn">✕</button>
    <div class="progress" id="progress"></div>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const type    = params.get('type')  || 'card';   // card | urgent | chat
    const title   = params.get('title') || '';
    const body    = params.get('body')  || '';
    const duration = parseInt(params.get('duration') || '5000');

    const ICONS = {
      card:   '✅',
      urgent: '🔴',
      chat:   '💬',
    };

    const LABELS = {
      card:   'Card atualizado',
      urgent: 'Urgente',
      chat:   'Nova mensagem',
    };

    const toast    = document.getElementById('toast');
    const progress = document.getElementById('progress');

    toast.classList.add(type);
    document.getElementById('icon').textContent      = ICONS[type]  || '🔔';
    document.getElementById('typeLabel').textContent = LABELS[type] || '';
    document.getElementById('title').textContent     = title;
    document.getElementById('body').textContent      = body;

    progress.style.animationDuration = `${duration}ms`;

    function dismiss() {
      toast.classList.add('fade-out');
      setTimeout(() => window.close(), 320);
    }

    toast.addEventListener('click', () => {
      window.electronAPI?.focusMain();
      dismiss();
    });

    document.getElementById('closeBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      dismiss();
    });

    setTimeout(dismiss, duration);
  </script>
</body>
</html>
