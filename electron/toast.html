<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', Inter, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    #root {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      width: 340px;
    }

    .toast {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(10, 10, 10, 0.97);
      border: 1px solid transparent;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.04);
      cursor: pointer;
      animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      transform-origin: right center;
      position: relative;
      transition: background 0.15s;
      width: 100%;
    }

    .toast:hover { background: rgba(18,18,18,0.99); }

    .toast.exiting {
      animation: toastOut 0.28s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(24px) scale(0.94); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0) scale(1); max-height: 100px; margin-bottom: 0; }
      to   { opacity: 0; transform: translateX(24px) scale(0.94); max-height: 0; margin-bottom: -10px; }
    }

    .icon {
      width: 30px; height: 30px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .icon svg { display: block; }

    .content { flex: 1; min-width: 0; }

    .title {
      font-size: 12px; font-weight: 700;
      color: #e0e0e0; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .body {
      margin-top: 3px;
      font-size: 11px; color: #666;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .close {
      background: none; border: none;
      color: #2a2a2a; cursor: pointer;
      padding: 2px; flex-shrink: 0;
      transition: color 0.15s;
      display: flex; align-items: center;
    }
    .toast:hover .close { color: #555; }
    .close:hover { color: #999 !important; }

    /* Progress bar */
    .progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      border-radius: 0 0 12px 12px;
      animation: progress linear forwards;
    }
    @keyframes progress {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const CONFIGS = {
      chat: {
        color: '#3b82f6',
        bg: 'rgba(37,99,235,0.12)',
        border: 'rgba(37,99,235,0.28)',
        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>`,
      },
      producing: {
        color: '#2563eb',
        bg: 'rgba(37,99,235,0.12)',
        border: 'rgba(37,99,235,0.28)',
        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>`,
      },
      urgent: {
        color: '#F75003',
        bg: 'rgba(247,80,3,0.12)',
        border: 'rgba(247,80,3,0.32)',
        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      },
      ready: {
        color: '#22c55e',
        bg: 'rgba(22,197,94,0.12)',
        border: 'rgba(22,197,94,0.28)',
        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,
      },
      info: {
        color: '#9ca3af',
        bg: 'rgba(156,163,175,0.10)',
        border: 'rgba(156,163,175,0.20)',
        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
      },
    };

    const DURATION = 12000; // ms antes de fechar automaticamente
    const root = document.getElementById('root');
    const toasts = new Map(); // id → { el, timer }

    function addToast({ id, type, title, body }) {
      const cfg = CONFIGS[type] || CONFIGS.info;

      const el = document.createElement('div');
      el.className = 'toast';
      el.style.borderLeftColor = cfg.color;
      el.style.borderLeftWidth = '3px';
      el.style.borderLeftStyle = 'solid';
      el.style.borderColor = cfg.border;
      el.style.borderLeftColor = cfg.color;

      el.innerHTML = `
        <div class="icon" style="background:${cfg.bg}; border:1px solid ${cfg.border}; color:${cfg.color}">
          ${cfg.icon}
        </div>
        <div class="content">
          <div class="title">${escHtml(title)}</div>
          ${body ? `<div class="body">${escHtml(body)}</div>` : ''}
        </div>
        <button class="close" title="Fechar">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="progress" style="background:${cfg.color}; animation-duration:${DURATION}ms;"></div>
      `;

      // Clicar no toast → foca o app principal
      el.addEventListener('click', (e) => {
        if (!e.target.closest('.close')) {
          window.toastAPI?.focusMain();
          dismissToast(id);
        }
      });

      el.querySelector('.close').addEventListener('click', (e) => {
        e.stopPropagation();
        dismissToast(id);
      });

      root.appendChild(el);
      window.toastAPI?.resize(root.scrollHeight + 24);

      const timer = setTimeout(() => dismissToast(id), DURATION);
      toasts.set(id, { el, timer });
    }

    function dismissToast(id) {
      const t = toasts.get(id);
      if (!t) return;
      clearTimeout(t.timer);
      t.el.classList.add('exiting');
      setTimeout(() => {
        t.el.remove();
        toasts.delete(id);
        window.toastAPI?.resize(Math.max(root.scrollHeight + 24, 1));
        if (toasts.size === 0) window.toastAPI?.hide();
      }, 300);
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Recebe toasts do processo main via preload
    window.toastAPI?.onShow(addToast);
  </script>
</body>
</html>
